# lint build and test the fronend and backend code
name: CI

on:
    push:
        branches: [ actions ]
        
jobs:
    frontend:
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout
              uses: actions/checkout@v4
              working-directory: frontend
            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'
                  cache-dependency-path: frontend/package-lock.json
            - name: Install dependencies
              run: npm install
            - name: Run lint
              run: npm run lint
            - name: Run Tests
              run: npm run test

