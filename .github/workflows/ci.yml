# lint build and test the fronend and backend code
name: CI

on:
    push:
        branches: [ actions ]
        
jobs:
    frontend:
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout
              uses: actions/checkout@v4
            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'
                  cache-dependency-path: frontend/package-lock.json
            - name: Install dependencies
              run: npm install
              working-directory: ./frontend
            - name: Run lint
              run: npm run lint
              working-directory: ./frontend
            - name: Run Tests
              run: npm run test
              working-directory: ./frontend
            - name: Docker login
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_ACCESS_TOKEN }}
            - name: Docker Build and Push
              uses: docker/build-push-action@v7
              with:
                context: ./frontend
                push: true
                tags: ${{ secrets.DOCKERHUB_USERNAME }}/devboard-frontend:latest



