# lint build and test the fronend and backend code
name: CI

on:
    push:
        branches: [ actions ]
        
jobs:
    frontend:
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout
              uses: actions/checkout@v4
            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'
                  cache-dependency-path: frontend/package-lock.json
            - name: Install dependencies
              run: npm install
              working-directory: ./frontend
            - name: Run lint
              run: npm run lint
              working-directory: ./frontend
            - name: Run Tests
              run: npm run test
              working-directory: ./frontend
            - name: Docker login
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Docker Build and Push
              uses: docker/build-push-action@v7
              with:
                context: ./frontend
                push: true
                tags: ${{ secrets.DOCKERHUB_USERNAME }}/devboard-frontend:latest

    backend:
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout
              uses: actions/checkout@v4
            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: '1.23'
                  go-version-file: backend/go.modss
                  cache-dependency-path: backend/go.sum
            - name: Install dependencies
              run: go mod tidy
              working-directory: ./backend
            - name: Run go fmt
              run: go fmt ./...
              working-directory: ./backend
            - name: Run Go Vet
              run: go vet ./...
              working-directory: ./backend
            - name: Run lint
              uses: golangci/golangci-lint-action@v6
              with:
                  working-directory: ./backend
            - name: Run Tests
              run: go test ./...
              working-directory: ./backend
            - name: Docker login
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Docker Build and Push
              uses: docker/build-push-action@v7
              with:
                context: ./backend
                push: true
                tags: ${{ secrets.DOCKERHUB_USERNAME }}/devboard-backend:latest

    deploy:
        needs: [frontend, backend]
        uses: ./.github/workflows/cd.yml
        secrets: inherit