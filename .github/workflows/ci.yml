# lint build and test the fronend and backend code
name: CI

on:
    push:
        paths-ignore:
            - 'README.md'
            - 'LICENSE'
            #- '!.github/workflows/**' # uncomment this if you dont want the ci workflow to run on every push in workflow directory.
        branches: [ actions ]
        
jobs:
    frontend:
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout
              uses: actions/checkout@v4
            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '20'
                  cache: 'npm'
                  cache-dependency-path: frontend/package-lock.json
            - name: Install dependencies
              run: npm ci
              working-directory: ./frontend
            - name: Run lint
              run: npm run lint
              working-directory: ./frontend
            - name: Run Tests
              run: npm run test
              working-directory: ./frontend

    backend:
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout
              uses: actions/checkout@v4
            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: '1.23'
                  go-version-file: backend/go.mod
                  cache-dependency-path: backend/go.sum
            - name: Install dependencies
              run: go mod download
              working-directory: ./backend
            - name: Run go fmt
              run: go fmt ./...
              working-directory: ./backend
            - name: Run Go Vet
              run: go vet ./...
              working-directory: ./backend
            - name: Run lint
              uses: golangci/golangci-lint-action@v6
              with:
                  working-directory: ./backend
            - name: Run Tests
              run: go test ./...
              working-directory: ./backend
            
    build-and-push:
        needs: [frontend, backend]
        runs-on: ubuntu-latest
        strategy:
            matrix:
                folder: [frontend, backend]
        steps:
            - name: Docker login
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Docker Build and Push
              uses: docker/build-push-action@v7
              with:
                context: ./${{ matrix.folder }}
                push: true
                tags: ${{ secrets.DOCKERHUB_USERNAME }}/devboard-${{ matrix.folder }}:latest    
    deploy:
        needs: [frontend, backend, build-and-push]
        uses: ./.github/workflows/cd.yml
        secrets: inherit