name: CD

on:
    workflow_call:

jobs:
    deploy:
        runs-on: self-hosted
        steps:
            - name: Code Checkout
              uses: actions/checkout@v4
            - name: Copy Environment variables
              run:  cp .env.example .env
            - name: Docker login
              uses: docker/login-action@v2
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
            - name: Deploying the container
              run: |
                docker compose down
                docker compose pull
                docker compose up -d
