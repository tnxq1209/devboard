# Code Quality Checks using SAST
name: Code Quality

on:
  workflow_call:

jobs:
    sast-frontend:
        runs-on: ubuntu-latest
        steps:
            - name: code checkout
              uses: actions/checkout@v4
            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  cache: 'npm'
                  cache-dependency-path: frontend/package-lock.json
            - name: Install dependencies
              run: npm ci
              working-directory: ./frontend
            - name: Run lint
              run: npm run lint > reports/code-quality-frontend.txt
              working-directory: ./frontend
              continue-on-error: true # Continue even if the command fails
            - name: Upload lint Results
              uses: actions/upload-artifact@v4
              if: always()  # Forces execution even if tests fail
              with:
                  name: code-quality-frontend # Name of the zip package inside GitHub UI
                  path: ./frontned/reports/code-quality-frontend.txt
                  retention-days: 7          # Optional expiration timeframe

    sast-backend:
        runs-on: ubuntu-latest
        steps:
            - name: code checkout
              uses: actions/checkout@v4
            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version-file: backend/go.mod
                  cache-dependency-path: backend/go.sum
            - name: Install dependencies
              run: go mod download
              working-directory: ./backend
            - name: Run go fmt
              run: go fmt ./...
              working-directory: ./backend  
            - name: Run Go Vet
              run: go vet ./...
              working-directory: ./backend
            - name: Run lint
              uses: golangci/golangci-lint-action@v7
              with:
                  working-directory: ./backend
                  skip-cache: true
                  args: --out-format=text:reports/code-quality-backend.txt,text:stdout
              continue-on-error: true # Continue even if the command fails
            - name: Upload lint Results
              uses: actions/upload-artifact@v4
              if: always()  # Forces execution even if tests fail
              with:
                  name: code-quality-backend # Name of the zip package inside GitHub UI
                  path: ./backend/reports/code-quality-backend.txt
                  retention-days: 7          # Optional expiration timeframe