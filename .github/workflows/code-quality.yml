# Code Quality Checks using SAST
name: Code Quality

on:
  workflow_call:

jobs:
    sast-frontend:
        runs-on: ubuntu-latest
        steps:
            - name: code checkout
              uses: actions/checkout@v4
            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: '24'
                  cache: 'npm'
                  cache-dependency-path: frontend/package-lock.json
            - name: Install dependencies
              run: npm ci
              working-directory: ./frontend
            - name: Run lint
              run: |
                mkdir -p reports
                npm run lint > reports/code-quality-frontend.txt
              working-directory: ./frontend
              continue-on-error: true # Continue even if the command fails
            - name: Upload lint Results
              uses: actions/upload-artifact@v4
              if: always()  # Forces execution even if tests fail
              with:
                  name: code-quality-frontend # Name of the zip package inside GitHub UI
                  path: ./frontend/reports/code-quality-frontend.txt
                  retention-days: 7          # Optional expiration timeframe

    sast-backend:
        runs-on: ubuntu-latest
        steps:
            - name: code checkout
              uses: actions/checkout@v4
            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version-file: backend/go.mod
                  cache-dependency-path: backend/go.sum
            - name: Install dependencies
              run: go mod download
              working-directory: ./backend
            - name: Run go fmt
              run: go fmt ./...
              working-directory: ./backend  
            - name: Run Go Vet
              run: go vet ./...
              working-directory: ./backend
            - name: Install golangci-lint
              run: | # Using install scipt from golangci-lint to install the latest version of golangci-lint instead of golangci/golangci-lint-action@v6 for artifact uploading purposes.
                curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
                  | sh -s -- -b /usr/local/bin
            - name: Run lint
              working-directory: ./backend
              run: |
                mkdir -p reports
                golangci-lint run > reports/code-quality-backend.txt
              continue-on-error: true # Continue even if the command fails
            - name: Upload lint Results
              uses: actions/upload-artifact@v4
              if: always()  # Forces execution even if tests fail
              with:
                  name: code-quality-backend # Name of the zip package inside GitHub UI
                  path: ./backend/reports/code-quality-backend.txt
                  retention-days: 7          # Optional expiration timeframe