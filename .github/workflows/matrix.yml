# To install multiple versions of Go
name: matrix

on: 
    workflow_dispatch:

jobs:
    code-format:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                go-version: [1.23, 1.24]
        steps:
            - name: Code Checkout
              uses: actions/checkout@v4
            - name: Set up Go
              uses: actions/setup-go@v6
              with:
                  go-version: ${{ matrix.go-version }}
                  go-version-file: backend/go.modss
                  cache-dependency-path: backend/go.sum
            - name: Run go fmt
              run: go fmt ./...
              working-directory: ./backend
            - name: Run Go Vet
              run: go vet ./...
              working-directory: ./backend