# Dast scan
name: OWASP ZAP

on: 
    workflow_call:
    
jobs:
    Scan:
        runs-on: ubuntu-latest
        steps:
            - name: Code Checkout
              uses: actions/checkout@v4
            - name: Wait for the service to be healthy
              run: |
                timeout 60s sh -c 'until curl -s http://${{ secrets.EC2_HOST }}:8080 > /dev/null; do sleep 2; done'
            - name: OWASP ZAP baseline scan
              uses: zaproxy/action-baseline@v0.14.0
              with:
                token: ${{ secrets.GITHUB_TOKEN }}
                target: 'http://${{ secrets.EC2_HOST }}:8080'
                fail_action: false
                allow_issue_writing: false
